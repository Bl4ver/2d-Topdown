<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Overdrive</title>
    <link rel="stylesheet" href="./style.css">

    <script src="./main.js" type="module" defer></script>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <!-- MARK: HUD -->
        <div id="hud" class="ui-screen hidden">
            <div class="hud-top-container">

                <div class="hud-left">
                    <div class="bar-item pink-theme">
                        <div class="bar-text">
                            <label>INTEGRITÁS</label>
                            <span id="hp-val">100%</span>
                        </div>
                        <div class="bar-line">
                            <div id="hp-fill" class="fill" style="width: 100%;"></div>
                        </div>
                    </div>
                    <div class="bar-item cyan-theme">
                        <div class="bar-text">
                            <label>PAJZS</label>
                            <span id="shield-val">0%</span>
                        </div>
                        <div class="bar-line">
                            <div id="shield-fill" class="fill" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>

                <div class="hud-center">
                    <div id="run-time-display" class="run-time">00:00</div>

                    <div id="score" class="digital-score">000000</div>
                    <div class="money-row">
                        <div class="coin-icon"></div>
                        <span id="credits-val">0</span>
                    </div>
                </div>

                <div class="hud-right">
                    <div class="level-container">
                        <div class="pause-diamond">
                            <div class="pause-icon btn-pause"></div>
                        </div>
                        <div class="level-label">SZINT 01</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- MARK: Main menu -->
        <section id="main-menu" class="ui-screen hidden">
            <h1 class="title">NEON</h1>
            <h1 class="altTitle">Overdrive</h1>
            <p class="description">- Cybercore Protocol: v1.3 -</p>
            <div id="menu-buttons">
                <button id="btn-start" class="button-menu">GAME MODES</button>
                <button id="btn-upgrades" class="button-menu">UPGRADES</button>
                <button id="btn-statistics" class="button-menu">STATISTICS</button>
                <button id="btn-encyclopedia" class="button-menu">ENCYCLOPEDIA</button>
                <button id="btn-settings" class="button-menu">SETTINGS</button>
            </div>
        </section>

        <!-- MARK: Settings Screen -->
        <section id="settings-screen" class="ui-screen hidden">
            <div class="cyber-panel">
                <h1 class="title">SETTINGS</h1>
                <p class="description">- Cybercore Protocol: v1.0 -</p>

                <div class="settings-list">
                    <div class="setting-item">
                        <label>LANGUAGE</label>
                        <div class="input-wrapper">
                            <select id="lang-select" class="cyber-select">
                                <option value="hu">MAGYAR</option>
                                <option value="en">ENGLISH</option>
                            </select>
                        </div>
                    </div>

                    <div class="setting-item">
                        <label>MASTER VOLUME</label>
                        <div class="range-wrapper">
                            <input type="range" id="vol-slider" min="0" max="100" value="70">
                            <span class="range-value">70%</span>
                        </div>
                    </div>
                </div>

                <button class="btn-back"> [ RETURN ] </button>
            </div>
        </section>

        <!-- MARK: Upgrade Screen -->
        <section id="upgrades-screen" class="ui-screen hidden scrollable-screen">
            <h2>FEGYVERTÁR</h2>

            <div class="money-row">
                <span>Kreditek: </span>
                <span id="upgrade-coins-val">0</span>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-target="playerUpgrades-container">JÁTÉKOS</button>
                <button class="tab-btn" data-target="weapons-container">FEGYVEREK</button>
                <button class="tab-btn" data-target="bots-container">BOTOK</button>
            </div>

            <div id="playerUpgrades-container" class="tab-content active cards-grid"></div>
            <div id="weapons-container" class="tab-content cards-grid"></div>
            <div id="bots-container" class="tab-content cards-grid"></div>

            <button class="btn-back">VISSZA</button>
        </section>

        <!-- MARK: Statistics Screen -->
        <section id="statistics-screen" class="ui-screen hidden">
            <div class="cyber-panel">
                <h1 class="title">STATISTICS</h1>
                <p class="description">[ DATABASE ACCESS: GRANTED ]</p>

                <div class="stats-list">
                    <div class="stat-row">
                        <label>ÖSSZES PONTSZÁM</label>
                        <span id="stat-allScore" class="stat-value cyan-text">0</span>
                    </div>

                    <div class="stat-row">
                        <label>ÖSSZES BEVÉTEL</label>
                        <span id="stat-money" class="stat-value cyan-text">0</span>
                    </div>

                    <div class="stat-row">
                        <label>MEGSEMMISÍTÉSEK</label>
                        <span id="stat-kills" class="stat-value cyan-text">0</span>
                    </div>

                    <div class="stat-row">
                        <label>VÉGTELEN REKORDIDŐ</label>
                        <span id="stat-maxTime" class="stat-value cyan-text">00:00</span>
                    </div>

                    <div class="stat-row">
                        <label>VÉGTELEN LEGRÖVIDEBB IDŐ</label>
                        <span id="stat-minTime" class="stat-value cyan-text">00:00</span>
                    </div>

                    <div class="stat-row">
                        <label>JÁTÉKIDŐ</label>
                        <span id="stat-allTime" class="stat-value cyan-text">00:00</span>
                    </div>
                </div>

                <button class="btn-back">BACK</button>
            </div>
        </section>

        <!-- MARK: Encyclopedia Screen -->
        <section id="encyclopedia-screen" class="ui-screen hidden scrollable-screen">
            <h2>ENCYCLOPEDIA</h2>

            <div class="tabs">
                <button class="tab-btn active" data-target="enemies-container">ELLENSÉGEK</button>
                <button class="tab-btn" data-target="bosses-container">BOSSES</button>
            </div>

            <div id="enemies-container" class="tab-content active cards-grid"></div>
            <div id="bosses-container" class="tab-content cards-grid"></div>

            <button class="btn-back">VISSZA</button>
        </section>

    </div>
</body>

</html>
